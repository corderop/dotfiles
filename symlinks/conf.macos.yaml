- clean: ['~']

- defaults:
    link:
      create: true
      force: true

- link:
    ~/.dotly: os/mac/.dotly
    ~/Library/Application Support/Code/User: editors/code
    ~/Library/Application Support/Antigravity/User: editors/antigravity
    ~/.config/karabiner: os/mac/karabiner/.config
    ~/Library/Keyboard Layouts/us-altgr-intl.keylayouts: os/mac/keyboard-layouts/us-altgr-intl.keylayout
    ~/.colima/ssh_config: os/mac/colima/ssh_config
    ~/.colima/default: os/mac/colima/default
    ~/.config/opencode: editors/agents/opencode
